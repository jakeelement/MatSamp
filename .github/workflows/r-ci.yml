name: R CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck

      - name: Parse R sources
        run: Rscript -e "files <- list.files('R', pattern='\\\\.R$', full.names=TRUE); lapply(files, parse); cat('Parsed', length(files), 'R files successfully\\n')"

      - name: R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          args: '--no-manual --as-cran'
